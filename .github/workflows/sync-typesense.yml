name: Sync Typesense Records

on:
  schedule:
    # Run every day at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-typesense:
    name: Sync Typesense Records
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.14.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Typesense sync script
        working-directory: apps/pwa
        run: pnpm run sync-typesense
        env:
          # Supabase environment variables (matching your .env file)
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

          # Typesense environment variables (matching your .env file)
          PUBLIC_TYPESENSE_HOST: ${{ secrets.PUBLIC_TYPESENSE_HOST }}
          PUBLIC_TYPESENSE_PORT: ${{ secrets.PUBLIC_TYPESENSE_PORT }}
          PUBLIC_TYPESENSE_PROTOCOL: ${{ secrets.PUBLIC_TYPESENSE_PROTOCOL }}
          TYPESENSE_ADMIN_KEY: ${{ secrets.TYPESENSE_ADMIN_KEY }}

